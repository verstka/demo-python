# Example nginx front for Verstka CMS demo.
# Adjust paths, server_name, TLS, and upstream port.

upstream demo_cms_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name example.com;

    client_max_body_size 20m;

    # FastAPI: CMS and Verstka callbacks
    location ^~ /cms {
        proxy_pass http://demo_cms_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /verstka/ {
        proxy_pass http://demo_cms_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static site root = SQLite / Verstka output tree (same as app storage_dir)
    root /var/www/demo-cms/storage;

    location = / {
        return 302 /index/;
    }

    location = /sitemap.xml {
        alias /var/www/demo-cms/storage/sitemap.xml;
    }

    location = /favicon.ico {
        alias /var/www/demo-cms/storage/favicon.ico;
    }

    location ~ ^/confs/(?<conf_file>[^/]+\.conf)$ {
        alias /var/www/demo-cms/confs/$conf_file;
        default_type text/plain;
    }

    location / {
        try_files $uri $uri/index.html =404;
    }
}
